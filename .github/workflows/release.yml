name: Release Please

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Only runs when release-please actually cut a new tag (i.e. the standing
  # Release PR was merged) — not on every push to main. Builds both images
  # from that exact tag and pushes them to GHCR. GHCR auth here uses the
  # default GITHUB_TOKEN (packages: write is sufficient) — the PAT above is
  # only needed for release-please's own PR/tag creation, a separate concern.
  build-and-push:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          # 1, not 0: this job builds one specific already-tagged commit —
          # no changelog/diff computation happens here (that's the
          # release-please job's job), so full history isn't needed.
          fetch-depth: 1

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.blog
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jonathanschwarzhaupt/home-blog:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/jonathanschwarzhaupt/home-blog:latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrate
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jonathanschwarzhaupt/home-blog-migrate:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/jonathanschwarzhaupt/home-blog-migrate:latest
